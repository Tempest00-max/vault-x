<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VAULT-X2 | Solaris Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;500;800&display=swap');

        :root {
            --primary: #00f2fe;
            --secondary: #4facfe;
            --accent: #f093fb;
            --bg: #f8fafc;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: var(--bg);
            color: #1e293b;
            overflow-x: hidden;
        }

        .glass {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(20px) saturate(180%);
            border: 1px solid rgba(255, 255, 255, 0.8);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.05);
        }

        .gradient-text {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .btn-gradient {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .btn-gradient:hover {
            transform: translateY(-3px) scale(1.02);
            box-shadow: 0 15px 30px rgba(79, 172, 254, 0.4);
        }

        .btn-purple {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
        }

        .btn-purple:hover {
            box-shadow: 0 15px 30px rgba(240, 147, 251, 0.4);
        }

        @keyframes float {

            0%,
            100% {
                transform: translateY(0px) rotate(0deg);
            }

            50% {
                transform: translateY(-20px) rotate(5deg);
            }
        }

        .floating-blob {
            position: absolute;
            width: 500px;
            height: 500px;
            filter: blur(80px);
            z-index: -1;
            animation: float 10s infinite ease-in-out;
            opacity: 0.4;
        }

        .drop-active {
            border-color: var(--primary) !important;
            background: rgba(0, 242, 254, 0.05);
            transform: scale(0.99);
        }
    </style>
</head>

<body class="min-h-screen flex items-center justify-center p-6 relative">

    <div class="floating-blob top-[-10%] left-[-10%]" style="background: #4facfe;"></div>
    <div class="floating-blob bottom-[-10%] right-[-10%]" style="background: #f093fb; animation-delay: -5s;"></div>
    <div class="floating-blob top-[20%] right-[10%] w-[300px] h-[300px]"
        style="background: #00f2fe; animation-delay: -2s;"></div>

    <div class="glass w-full max-w-xl rounded-[40px] p-10 md:p-14 z-10 border-white">
        <div class="text-center mb-12">
            <h1 class="text-6xl font-extrabold tracking-tight mb-3 gradient-text">VAULT-X2</h1>
            <p class="text-sm font-semibold tracking-widest text-slate-400 uppercase">Secure Neural Gateway</p>
        </div>

        <div id="dropZone" class="relative group mb-10">
            <div
                class="absolute -inset-1 bg-gradient-to-r from-cyan-400 to-blue-500 rounded-[32px] blur opacity-20 group-hover:opacity-40 transition duration-1000">
            </div>
            <div
                class="relative border-2 border-dashed border-slate-200 rounded-[30px] p-16 text-center transition-all cursor-pointer bg-white/50">
                <div class="mb-6 flex justify-center">
                    <div class="p-5 bg-cyan-50 rounded-2xl">
                        <svg class="w-10 h-10 text-cyan-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12" />
                        </svg>
                    </div>
                </div>
                <p id="fileNameDisplay" class="text-lg font-bold text-slate-700">Drop your file here</p>
                <p class="text-xs text-slate-400 mt-2 font-medium">PNG, JPG, PDF, or ANY BINARY</p>
                <input type="file" id="fileInput" class="hidden">
            </div>
        </div>

        <div class="space-y-8">
            <div class="relative">
                <label class="text-[11px] font-bold uppercase tracking-widest text-slate-400 mb-3 block ml-2">Master
                    Authentication Cipher</label>
                <input type="password" id="passwordInput" placeholder="Enter Secure Key"
                    class="w-full bg-white border border-slate-100 rounded-2xl px-6 py-5 outline-none focus:ring-4 focus:ring-cyan-100 transition-all text-center text-lg font-medium shadow-sm">
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-5 pt-2">
                <button onclick="processStream('encrypt')"
                    class="btn-gradient py-5 rounded-2xl text-white text-xs font-extrabold uppercase tracking-widest">
                    Encrypt Stream
                </button>
                <button onclick="processStream('decrypt')"
                    class="btn-purple py-5 rounded-2xl text-white text-xs font-extrabold uppercase tracking-widest shadow-lg shadow-purple-100">
                    Decrypt Stream
                </button>
            </div>
        </div>

        <div class="mt-12">
            <div id="sessionHistory"
                class="bg-slate-50/50 rounded-2xl p-6 h-28 overflow-y-auto text-[11px] font-bold font-mono text-slate-400 border border-slate-100 space-y-2">
                <p>> SYSTEM READY. AWAITING STREAM...</p>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = "https://vault-x-production-efdb.up.railway.app";
        const dropZone = document.getElementById('dropZone');
        const fileInput = document.getElementById('fileInput');
        const fileNameDisplay = document.getElementById('fileNameDisplay');
        const history = document.getElementById('sessionHistory');
        let selectedFile = null;

        function handleFile(files) {
            const file = files || files;
            if (!file || !(file instanceof File)) return;

            selectedFile = file;
            const sizeMB = (file.size / (1024 * 1024)).toFixed(2);
            fileNameDisplay.innerText = `${file.name.toUpperCase()} (${sizeMB} MB)`;
            fileNameDisplay.classList.add('gradient-text');
            logAction(`FILE_LOADED: ${file.name}`);
        }

        dropZone.addEventListener('click', () => fileInput.click());
        fileInput.addEventListener('change', (e) => handleFile(e.target.files));

        dropZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            dropZone.classList.add('drop-active');
        });

        dropZone.addEventListener('dragleave', () => {
            dropZone.classList.remove('drop-active');
        });

        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.classList.remove('drop-active');
            if (e.dataTransfer.files.length > 0) handleFile(e.dataTransfer.files);
        });

        async function processStream(mode) {
            const password = document.getElementById('passwordInput').value;
            if (!selectedFile || !password) {
                logAction("ERR: DATA_MISSING", "text-red-400");
                return;
            }

            logAction(`STREAMING_${mode.toUpperCase()}...`);

            const formData = new FormData();
            formData.append('file', selectedFile);
            formData.append('password', password);
            formData.append('mode', mode);

            try {
                const response = await fetch(`${API_BASE}/process-file`, {
                    method: 'POST',
                    body: formData
                });

                if (!response.ok) {
                    const errorJson = await response.json();
                    throw new Error(errorJson.detail || "SERVER_REJECTION");
                }

                const blob = await response.blob();
                const url = window.URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = mode === 'encrypt' ? `${selectedFile.name}.vx2` : selectedFile.name.replace('.vx2', '');
                document.body.appendChild(a);
                a.click();
                window.URL.revokeObjectURL(url);
                logAction("TRANSFER_COMPLETE", "text-cyan-500");
            } catch (err) {
                logAction(`DENIED: ${err.message.toUpperCase()}`, "text-red-400");
            }
        }

        function logAction(msg, colorClass = "") {
            const p = document.createElement('p');
            p.className = colorClass;
            p.innerText = `> ${msg}`;
            history.prepend(p);
        }
    </script>
</body>

</html>
