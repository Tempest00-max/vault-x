<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VAULT-X2 | Obsidian Security</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syncopate:wght@400;700&display=swap');

        :root {
            --neon-blue: #00f2ff;
            --neon-green: #39ff14;
            --neon-purple: #bc13fe;
            --bg-dark: #050505;
        }

        body {
            background-color: var(--bg-dark);
            font-family: 'Space Mono', monospace;
            background-image:
                radial-gradient(circle at 50% 50%, #1a1a2e 0%, #050505 100%);
            overflow-x: hidden;
        }

        .header-font {
            font-family: 'Syncopate', sans-serif;
        }

        /* Glassmorphism Card */
        .glass-card {
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 0 40px rgba(0, 0, 0, 0.5);
        }

        /* Animated Scanline Effect */
        .scanline {
            width: 100%;
            height: 100px;
            z-index: 10;
            background: linear-gradient(0deg, rgba(0, 242, 255, 0) 0%, rgba(0, 242, 255, 0.05) 50%, rgba(0, 242, 255, 0) 100%);
            opacity: 0.1;
            position: absolute;
            bottom: 100%;
            animation: scanline 8s linear infinite;
        }

        @keyframes scanline {
            0% {
                bottom: 100%;
            }

            100% {
                bottom: -100%;
            }
        }

        /* Neon Glowing Buttons */
        .btn-neon-green {
            border: 1px solid var(--neon-green);
            color: var(--neon-green);
            box-shadow: inset 0 0 10px rgba(57, 255, 20, 0.2);
            transition: 0.3s;
        }

        .btn-neon-green:hover {
            background: var(--neon-green);
            color: black;
            box-shadow: 0 0 20px var(--neon-green);
        }

        .btn-neon-purple {
            border: 1px solid var(--neon-purple);
            color: var(--neon-purple);
            box-shadow: inset 0 0 10px rgba(188, 19, 254, 0.2);
            transition: 0.3s;
        }

        .btn-neon-purple:hover {
            background: var(--neon-purple);
            color: white;
            box-shadow: 0 0 20px var(--neon-purple);
        }

        .drop-zone {
            border: 1px dashed rgba(255, 255, 255, 0.1);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .drop-zone:hover {
            border-color: var(--neon-blue);
            background: rgba(0, 242, 255, 0.02);
            transform: scale(1.01);
        }

        input:focus {
            box-shadow: 0 0 15px rgba(0, 242, 255, 0.1);
        }
    </style>
</head>

<body class="min-h-screen flex items-center justify-center p-4 relative overflow-hidden">

    <div class="scanline"></div>

    <div class="w-full max-w-2xl glass-card rounded-2xl p-8 sm:p-12 relative z-20">

        <div class="text-center mb-12">
            <h1 class="header-font text-3xl sm:text-5xl font-bold tracking-tighter text-white mb-2">
                VAULT<span class="text-[#00f2ff]">-</span>X2
            </h1>
            <div
                class="flex justify-center items-center gap-3 text-[10px] tracking-[0.4em] text-gray-500 font-bold uppercase">
                <span class="w-1.5 h-1.5 bg-[#00f2ff] rounded-full shadow-[0_0_8px_#00f2ff]"></span>
                Neural Stream Active
            </div>
        </div>

        <div id="dropZone" class="drop-zone rounded-xl p-12 mb-8 text-center cursor-pointer group">
            <input type="file" id="fileInput" class="hidden">
            <div id="fileInfo">
                <div class="mb-4 flex justify-center">
                    <svg class="w-12 h-12 text-gray-600 group-hover:text-[#00f2ff] transition-colors" fill="none"
                        stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1"
                            d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12" />
                    </svg>
                </div>
                <p
                    class="text-xs font-bold tracking-[0.2em] text-gray-400 group-hover:text-white transition-colors uppercase">
                    Initialize Binary Transfer</p>
                <p id="fileNameDisplay" class="text-xs text-[#00f2ff] font-bold mt-4 hidden break-all"></p>
            </div>
        </div>

        <div class="mb-10">
            <label
                class="block text-[9px] font-bold tracking-[0.5em] text-gray-500 mb-3 uppercase">Master_Access_Cipher</label>
            <input id="masterKey" type="password"
                class="w-full bg-black border border-white/5 rounded-lg p-4 text-sm text-[#00f2ff] focus:outline-none focus:border-[#00f2ff] transition-all"
                placeholder="••••••••••••">
        </div>

        <div class="grid grid-cols-1 sm:grid-cols-2 gap-6 mb-10">
            <button onclick="uploadAndProcess('encrypt')"
                class="btn-neon-green py-4 rounded-lg text-xs font-bold uppercase tracking-[0.2em]">Encrypt
                Stream</button>
            <button onclick="uploadAndProcess('decrypt')"
                class="btn-neon-purple py-4 rounded-lg text-xs font-bold uppercase tracking-[0.2em]">Decrypt
                Stream</button>
        </div>

        <div class="border-t border-white/5 pt-6">
            <div class="flex justify-between items-center mb-4">
                <p id="statusLabel" class="text-[9px] font-bold text-gray-600 uppercase tracking-widest">Awaiting
                    Command...</p>
                <button onclick="wipeLog()"
                    class="text-[8px] text-red-900 uppercase font-bold hover:text-red-500 transition-colors">Wipe
                    History</button>
            </div>
            <div id="sessionHistory" class="max-h-20 overflow-y-auto space-y-2 font-mono text-[8px] text-gray-700">
            </div>
        </div>
    </div>

    <div class="absolute top-[-10%] left-[-10%] w-[40%] h-[40%] bg-[#00f2ff] rounded-full blur-[150px] opacity-[0.03]">
    </div>
    <div
        class="absolute bottom-[-10%] right-[-10%] w-[40%] h-[40%] bg-[#bc13fe] rounded-full blur-[150px] opacity-[0.03]">
    </div>

    <script>
        const API_BASE = "https://vault-x-production-efdb.up.railway.app";
        const dropZone = document.getElementById('dropZone');
        const fileInput = document.getElementById('fileInput');
        const fileNameDisplay = document.getElementById('fileNameDisplay');
        let selectedFile = null;

        dropZone.addEventListener('click', () => fileInput.click());
        fileInput.addEventListener('change', (e) => { if (e.target.files.length > 0) handleFile(e.target.files); });
        dropZone.addEventListener('dragover', (e) => { e.preventDefault(); dropZone.style.borderColor = "#00f2ff"; });
        dropZone.addEventListener('dragleave', () => { dropZone.style.borderColor = "rgba(255,255,255,0.1)"; });
        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.style.borderColor = "rgba(255,255,255,0.1)";
            if (e.dataTransfer.files.length > 0) handleFile(e.dataTransfer.files);
        });

        function handleFile(file) {
            if (!file) return; // Add this line!
            selectedFile = file;
            // Ensure file.name exists before calling toUpperCase
            fileNameDisplay.innerText = `READY: ${file.name ? file.name.toUpperCase() : 'UNKNOWN'} [${(file.size / 1024 / 1024).toFixed(2)} MB]`;
        }

        async function uploadAndProcess(action) {
            const password = document.getElementById('masterKey').value;
            const status = document.getElementById('statusLabel');

            if (!selectedFile || !password) return;

            status.innerText = `PROCESSING ${action.toUpperCase()}...`;
            status.style.color = "#00f2ff";

            const formData = new FormData();
            formData.append('file', selectedFile);
            formData.append('password', password);
            formData.append('action', action);

            try {
                const response = await fetch(`${API_BASE}/process-file`, { method: 'POST', body: formData });
                if (!response.ok) throw new Error();

                const blob = await response.blob();
                const url = window.URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = action === 'encrypt' ? `${selectedFile.name}.vx2` : selectedFile.name.replace('.vx2', '');
                a.click();

                status.innerText = "STREAM SECURED.";
                status.style.color = "#39ff14";
                logAction(action, selectedFile.name);
            } catch (err) {
                status.innerText = "ACCESS DENIED: INCORRECT CIPHER";
                status.style.color = "#ff3131";
            }
        }

        function logAction(action, name) {
            const history = document.getElementById('sessionHistory');
            const p = document.createElement('p');
            p.innerText = `> ${action.toUpperCase()} | ${name}`;
            history.prepend(p);
        }

        function wipeLog() { document.getElementById('sessionHistory').innerHTML = ""; }
    </script>
</body>

</html>
