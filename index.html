<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VAULT-X2 | Obsidian Security</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&display=swap');

        body {
            font-family: 'Space Grotesk', sans-serif;
            background-color: #0a0a0c;
            color: #e2e2e4;
        }

        .glass {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .neon-glow:hover {
            box-shadow: 0 0 15px rgba(16, 185, 129, 0.2);
            border-color: #10b981;
        }

        .neon-glow-purple:hover {
            box-shadow: 0 0 15px rgba(139, 92, 246, 0.2);
            border-color: #8b5cf6;
        }

        @keyframes pulse-cyan {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0.4;
            }
        }

        .status-dot {
            width: 8px;
            height: 8px;
            background: #22d3ee;
            border-radius: 50%;
            display: inline-block;
            box-shadow: 0 0 8px #22d3ee;
            animation: pulse-cyan 2s infinite;
        }
    </style>
</head>

<body class="min-h-screen flex items-center justify-center p-4 relative overflow-hidden">

    <div class="absolute top-0 left-0 w-full h-full pointer-events-none opacity-20">
        <div class="absolute -top-[10%] -left-[10%] w-[40%] h-[40%] bg-[#10b981] rounded-full blur-[150px]"></div>
        <div class="absolute -bottom-[10%] -right-[10%] w-[40%] h-[40%] bg-[#8b5cf6] rounded-full blur-[150px]"></div>
    </div>

    <div class="glass w-full max-w-lg rounded-3xl p-8 z-10">
        <div class="text-center mb-10">
            <h1 class="text-5xl font-bold tracking-tighter mb-2">VAULT-<span class="text-[#22d3ee]">X2</span></h1>
            <p class="text-xs tracking-[0.3em] text-gray-500 uppercase flex items-center justify-center gap-2">
                <span class="status-dot"></span> Neural Stream Active
            </p>
        </div>

        <div id="dropZone"
            class="border-2 border-dashed border-white/10 rounded-2xl p-12 text-center transition-all cursor-pointer group mb-8">
            <div class="mb-4 flex justify-center">
                <svg class="w-12 h-12 text-gray-600 group-hover:text-[#22d3ee] transition-colors" fill="none"
                    stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
                        d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12" />
                </svg>
            </div>
            <p id="fileNameDisplay" class="text-sm text-gray-400 font-medium tracking-wider">INITIALIZE BINARY TRANSFER
            </p>
            <input type="file" id="fileInput" class="hidden">
        </div>

        <div class="space-y-6">
            <div class="group">
                <label
                    class="text-[10px] uppercase tracking-widest text-gray-500 ml-1 mb-2 block">Master_Access_Cipher</label>
                <input type="password" id="passwordInput" placeholder="••••••••••••"
                    class="w-full bg-black/40 border border-white/5 rounded-xl px-4 py-4 outline-none focus:border-[#22d3ee]/50 transition-all text-center tracking-[0.5em]">
            </div>

            <div class="flex gap-4 pt-4">
                <button onclick="processStream('encrypt')"
                    class="flex-1 glass neon-glow py-4 rounded-xl text-[10px] font-bold uppercase tracking-widest transition-all">
                    Encrypt Stream
                </button>
                <button onclick="processStream('decrypt')"
                    class="flex-1 glass neon-glow-purple py-4 rounded-xl text-[10px] font-bold uppercase tracking-widest transition-all">
                    Decrypt Stream
                </button>
            </div>
        </div>

        <div class="mt-12 pt-6 border-t border-white/5">
            <div id="sessionHistory" class="text-[10px] font-mono text-gray-600 h-20 overflow-y-auto space-y-1">
                <p>AWAITING COMMAND...</p>
            </div>
            <div class="flex justify-between items-center mt-4">
                <button onclick="wipeLog()"
                    class="text-[9px] uppercase tracking-tighter text-red-900 hover:text-red-500 transition-colors">Wipe
                    History</button>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = "https://vault-x-production-efdb.up.railway.app";
        const dropZone = document.getElementById('dropZone');
        const fileInput = document.getElementById('fileInput');
        const fileNameDisplay = document.getElementById('fileNameDisplay');
        const history = document.getElementById('sessionHistory');
        let selectedFile = null;

        // Logic Fix: Unified File Handler
        function handleFile(input) {
            const file = input instanceof FileList ? input : input;
            if (!file) return;

            selectedFile = file;
            const safeName = file.name ? file.name.toUpperCase() : "UNKNOWN_FILE";
            fileNameDisplay.innerText = `READY: ${safeName} [${(file.size / 1024 / 1024).toFixed(2)} MB]`;
            logAction(`FILE_LOADED: ${safeName}`);
        }

        dropZone.addEventListener('click', () => fileInput.click());
        fileInput.addEventListener('change', (e) => handleFile(e.target.files));

        dropZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            dropZone.style.borderColor = "#22d3ee";
        });

        dropZone.addEventListener('dragleave', () => {
            dropZone.style.borderColor = "rgba(255,255,255,0.1)";
        });

        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.style.borderColor = "rgba(255,255,255,0.1)";
            if (e.dataTransfer.files.length > 0) handleFile(e.dataTransfer.files);
        });

        async function processStream(mode) {
            const password = document.getElementById('passwordInput').value;
            if (!selectedFile || !password) {
                logAction("ERROR: MISSING_CIPHER_OR_FILE", "text-red-500");
                return;
            }

            logAction(`INITIALIZING_${mode.toUpperCase()}...`);

            const formData = new FormData();
            formData.append('file', selectedFile);
            formData.append('password', password);
            formData.append('mode', mode);

            try {
                const response = await fetch(`${API_BASE}/process-file`, {
                    method: 'POST',
                    body: formData
                });

                if (!response.ok) {
                    const errData = await response.json();
                    throw new Error(errData.detail || "NETWORK_REJECTION");
                }

                const blob = await response.blob();
                const url = window.URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;

                // Set download filename
                const originalName = selectedFile.name;
                a.download = mode === 'encrypt' ? `${originalName}.vx2` : originalName.replace('.vx2', '');

                document.body.appendChild(a);
                a.click();
                a.remove();
                logAction(`STREAM_${mode.toUpperCase()}_SUCCESS`, "text-green-500");
            } catch (err) {
                logAction(`ACCESS_DENIED: ${err.message.toUpperCase()}`, "text-red-500");
            }
        }

        function logAction(msg, colorClass = "") {
            const p = document.createElement('p');
            p.className = colorClass;
            p.innerText = `> ${msg}`;
            history.prepend(p);
        }

        function wipeLog() { history.innerHTML = ""; }
    </script>
</body>

</html>
