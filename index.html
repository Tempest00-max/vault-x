<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VAULT-X2 | Solaris Elite</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;500;800&display=swap');

        :root {
            --primary: #00f2fe;
            --secondary: #4facfe;
            --bg: #f8fafc;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: var(--bg);
            touch-action: pan-y;
        }

        .glass {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
    </style>
</head>

<body class="min-h-screen flex items-center justify-center p-4">
    <div class="glass w-full max-w-md rounded-[2.5rem] p-8 shadow-2xl space-y-8">
        <div class="text-center">
            <h1
                class="text-4xl font-extrabold tracking-tighter text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 to-blue-600">
                VAULT-X2</h1>
            <p class="text-[10px] tracking-[0.3em] font-bold text-slate-400 uppercase mt-1">Secure Neural Gateway</p>
        </div>

        <!-- Hidden File Input -->
        <input type="file" id="fileInput" class="hidden">

        <div onclick="document.getElementById('fileInput').click()"
            class="border-2 border-dashed border-slate-200 rounded-[2rem] p-10 flex flex-col items-center justify-center space-y-4 cursor-pointer hover:border-cyan-400 transition-all duration-300 group">
            <div
                class="w-16 h-16 bg-cyan-50 rounded-2xl flex items-center justify-center group-hover:scale-110 transition-transform">
                <svg class="w-8 h-8 text-cyan-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12" />
                </svg>
            </div>
            <div class="text-center">
                <p id="fileName" class="text-slate-600 font-bold">TAP TO LOAD FILE</p>
                <p class="text-[10px] text-slate-400 font-medium mt-1 uppercase tracking-widest">PNG, JPG, PDF, BINARY
                </p>
            </div>
        </div>

        <div class="space-y-4">
            <input type="password" id="key" placeholder="Enter Secure Key"
                class="w-full bg-slate-50 border-none rounded-2xl px-6 py-5 focus:ring-2 ring-cyan-400 outline-none font-medium transition-all text-center">
            <button id="encryptBtn"
                class="w-full bg-gradient-to-r from-cyan-400 to-blue-500 text-white font-extrabold py-5 rounded-2xl shadow-lg shadow-cyan-200 active:scale-[0.98] transition-all uppercase tracking-widest">Encrypt
                Stream</button>
        </div>
    </div>

    <script>
        let selectedFile = null;
        const fileInput = document.getElementById('fileInput');
        const fileNameDisplay = document.getElementById('fileName');

        fileInput.addEventListener('change', (e) => {
            if (e.target.files.length > 0) {
                selectedFile = e.target.files[0];
                fileNameDisplay.innerText = "LOCKED: " + selectedFile.name.toUpperCase();
                fileNameDisplay.classList.remove('text-slate-600');
                fileNameDisplay.classList.add('text-cyan-500');
            }
        });

        document.getElementById('encryptBtn').onclick = () => {
            if (!selectedFile) {
                alert("CRITICAL: NO DATA LOADED");
                return;
            }
            alert("ENCRYPTING: " + selectedFile.name);
        };
    </script>
</body>

</html>
